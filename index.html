<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>局域网聊天室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>局域网聊天室</h1>
    <div class="login" id="loginForm">
      <form>
        <input type="text" id="username" placeholder="请输入用户名">
        <button type="submit">进入聊天室</button>
      </form>
    </div>
    <div class="chat hidden" id="chatContainer">
      <div class="sharer-list hidden" id="sharerList"></div>
      <div class="screen-share-area hidden" id="screenShareArea">
        <div class="screen-share-header">
          <span id="screenShareName"></span>
          <div>
            <button id="screenShareFullscreenBtn" style="background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:0 4px;">⛶ 全屏</button>
            <button id="screenShareClose">✕</button>
          </div>
        </div>
        <video id="screenShareVideo" autoplay playsinline></video>
      </div>
      <div class="messages"></div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息...">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button id="imageBtn">图片</button>
        <button id="fileBtn">📁 文件</button>
        <input type="file" id="fileInput" style="display: none;">
        <button id="screenShareBtn">📺 共享</button>
        <a href="game.html" id="gameBtn" style="display:inline-block;text-decoration:none;">🎮 游戏</a>
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <!-- 文件面板 -->
  <div class="file-panel hidden" id="filePanel">
    <div class="file-panel-header">
      <span>📁 文件共享</span>
      <button id="filePanelClose">✕</button>
    </div>
    <div class="file-panel-list" id="fileList"></div>
    <div class="file-panel-footer">
      <button id="fileUploadBtn">上传文件</button>
    </div>
    <div class="file-panel-status hidden" id="fileUploadStatus">
      <span id="fileStatusText">正在处理...</span>
      <div class="file-progress-bar" id="fileProgressBar"><div class="file-progress-fill" id="fileProgressFill"></div></div>
    </div>
  </div>
    </div>
  </div>

  <!-- 小窗模式切换按钮 -->
  <button class="stealth-toggle" id="stealthBtn" title="小窗模式 (Ctrl+Shift+H)">📝</button>

  <!-- 屏幕共享不可用提示弹窗 -->
  <div class="modal hidden" id="shareUnsupportedModal">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <h2>屏幕共享不可用</h2>
        <button class="modal-close" id="shareUnsupportedClose">✕</button>
      </div>
      <div class="modal-body" style="padding:16px;line-height:1.8;font-size:14px;user-select:text;white-space:pre-wrap;" id="shareUnsupportedText"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
