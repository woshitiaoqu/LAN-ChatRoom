<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>局域网聊天室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>局域网聊天室</h1>
    <div class="login" id="loginForm">
      <form>
        <input type="text" id="username" placeholder="请输入用户名">
        <button type="submit">进入聊天室</button>
      </form>
    </div>
    <div class="chat hidden" id="chatContainer">
      <div class="messages"></div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息...">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button id="imageBtn">图片</button>
        <button id="gameBtn">🎮 游戏</button>
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <!-- 游戏大厅弹窗 -->
  <div class="modal hidden" id="gameLobby">
    <div class="modal-content game-lobby">
      <div class="modal-header">
        <h2>🎮 游戏大厅</h2>
        <button class="modal-close" id="lobbyClose">✕</button>
      </div>
      <div class="game-section">
        <h3>选择游戏</h3>
        <div class="game-list">
          <div class="game-card" data-game="gomoku">
            <div class="game-icon">⚫</div>
            <div class="game-name">五子棋</div>
            <div class="game-desc">经典黑白棋，五子连珠获胜</div>
          </div>
        </div>
        <div style="margin-top: 10px; text-align: right;">
          <button class="game-btn-create" id="createGameBtn">创建房间</button>
        </div>
      </div>
      <div class="game-section">
        <h3>进行中的游戏</h3>
        <div id="activeGames" class="active-games">
          <p class="empty-tip">暂无进行中的游戏</p>
        </div>
      </div>
      <div class="game-section">
        <h3>选择对手</h3>
        <div id="playerList" class="player-list">
          <p class="empty-tip">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 五子棋棋盘弹窗 -->
  <div class="modal hidden" id="gomokuModal">
    <div class="modal-content gomoku-container">
      <div class="modal-header">
        <h2 id="gomokuTitle">⚫ 五子棋</h2>
        <button class="modal-close" id="gomokuClose">✕</button>
      </div>
      <div class="gomoku-info">
        <span id="gomokuTurn"></span>
        <span id="gomokuSpectators">观战: 0人</span>
      </div>
      <div class="gomoku-board-wrap">
        <div class="gomoku-board" id="gomokuBoard"></div>
        <div class="danmaku-layer" id="danmakuLayer"></div>
      </div>
      <div class="gomoku-chat">
        <div class="gomoku-chat-messages" id="gomokuChatMessages"></div>
        <div class="gomoku-chat-input">
          <input type="text" id="gomokuChatInput" placeholder="发弹幕聊天...">
          <button id="gomokuChatSend">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 邀请弹窗 -->
  <div class="modal hidden" id="inviteModal">
    <div class="modal-content invite-popup">
      <div class="invite-header">🎮 游戏邀请</div>
      <div class="invite-body">
        <div class="invite-icon">⚫</div>
        <div class="invite-text" id="inviteText">邀请你来五子棋对战！</div>
        <div class="invite-from" id="inviteFrom"></div>
      </div>
      <div class="invite-actions">
        <button class="invite-btn invite-accept" id="inviteAccept">接受</button>
        <button class="invite-btn invite-decline" id="inviteDecline">拒绝</button>
      </div>
    </div>
  </div>

  <!-- 小窗模式切换按钮 -->
  <button class="stealth-toggle" id="stealthBtn" title="小窗模式 (Ctrl+Shift+H)">📝</button>

  <script src="script.js"></script>
</body>
</html>
