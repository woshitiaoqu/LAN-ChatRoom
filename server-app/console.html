<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN Chat 服务端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Microsoft YaHei', 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#tabs { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#tabs button { background: none; border: none; color: #888; padding: 10px 24px; cursor: pointer; font-size: 14px; font-family: inherit; border-bottom: 2px solid transparent; }
#tabs button:hover { color: #e0e0e0; }
#tabs button.active { color: #e94560; border-bottom-color: #e94560; }
.tab-content { flex: 1; overflow: hidden; display: none; }
.tab-content.active { display: flex; flex-direction: column; }

/* Log tab */
#log { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.6; font-family: 'Consolas', monospace; user-select: text; -webkit-user-select: text; }
#log div { white-space: pre-wrap; word-break: break-all; }
#log .info { color: #a0a0a0; }
#log .err { color: #e94560; }
#log .ok { color: #4ecca3; }

/* Admin tab */
#admin { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }
.admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.admin-card { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 12px; }
.admin-card h3 { color: #e94560; font-size: 14px; margin-bottom: 8px; font-weight: normal; }
.admin-card label { display: block; color: #aaa; font-size: 12px; margin-bottom: 2px; }
.admin-card input, .admin-card select { width: 100%; padding: 6px 8px; background: #0f2248; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; margin-bottom: 6px; font-size: 13px; font-family: inherit; }
.admin-card button { padding: 6px 16px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; margin-right: 6px; margin-bottom: 4px; }
.admin-card button:hover { background: #d63851; }
.admin-card button.sec { background: #0f3460; }
.admin-card button.sec:hover { background: #1a4a8a; }
.admin-card button.danger { background: #a03030; }
.admin-card button.danger:hover { background: #c04040; }
.admin-card .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.admin-card .row input { margin-bottom: 0; flex: 1; }
.admin-card .list { max-height: 160px; overflow-y: auto; font-size: 12px; }
.admin-card .list-item { padding: 3px 6px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.admin-card .list-item .del { color: #e94560; cursor: pointer; padding: 0 4px; font-size: 14px; }
.admin-card table { width: 100%; font-size: 12px; border-collapse: collapse; }
.admin-card th, .admin-card td { text-align: left; padding: 3px 6px; border-bottom: 1px solid #0f3460; }
.admin-card th { color: #888; font-weight: normal; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-dot.online { background: #4ecca3; }
.status-dot.muted { background: #e94560; }
#toast { position: fixed; bottom: 20px; right: 20px; background: #16213e; border: 1px solid #0f3460; padding: 10px 20px; border-radius: 6px; font-size: 13px; display: none; z-index: 999; }
</style>
</head>
<body>
<div id="tabs">
  <button class="active" data-tab="log-tab">📋 日志</button>
  <button data-tab="admin-tab">⚙️ 管理</button>
</div>

<div id="log-tab" class="tab-content active"><div id="log"></div></div>

<div id="admin-tab" class="tab-content"><div id="admin"><div class="admin-grid" id="adminGrid"></div></div></div>

<div id="toast"></div>

<script>
const { ipcRenderer } = require('electron');

// Tab switching
document.querySelectorAll('#tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  };
});

// Toast
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 3000);
}

// Log
function addLog(msg) {
  const log = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = msg;
  if (msg.startsWith('[ERR]')) d.className = 'err';
  else if (msg.includes('✅') || msg.includes('🚀')) d.className = 'ok';
  else d.className = 'info';
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

// Admin UI
async function call(fn, ...args) {
  try { return await ipcRenderer.invoke(fn, ...args); } catch (e) { toast('操作失败: ' + e.message); return null; }
}

async function loadAdmin() {
  const grid = document.getElementById('adminGrid');
  grid.innerHTML = '';

  // Server Status
  const status = await call('admin:getServerStatus');
  if (status) {
    const card = mkCard('服务器状态');
    card.innerHTML += `<table><tr><th>运行时间</th><td>${status.uptime}</td></tr><tr><th>总连接数</th><td>${status.totalConnections}</td></tr><tr><th>在线用户</th><td>${status.onlineUsers}</td></tr><tr><th>内存 (RSS)</th><td>${status.memoryUsage.rss} MB</td></tr><tr><th>内存 (堆)</th><td>${status.memoryUsage.heapUsed}/${status.memoryUsage.heapTotal} MB</td></tr></table>`;
    const cnt = await call('admin:getTotalMessageCount');
    if (cnt !== null) card.innerHTML += `<table><tr><th>消息总数</th><td>${cnt}</td></tr></table>`;
    grid.appendChild(card);
  }

  // Online Users
  const users = await call('admin:getOnlineUsers');
  const ucard = mkCard(`在线用户 (${(users||[]).length})`);
  ucard.innerHTML += '<div class="list" id="userList"></div>';
  const ul = ucard.querySelector('#userList');
  function renderUsers() {
    call('admin:getOnlineUsers').then(u => {
      ul.innerHTML = '';
      (u||[]).forEach(user => {
        const d = document.createElement('div');
        d.className = 'list-item';
        d.innerHTML = `<span><span class="status-dot ${user.muted ? 'muted' : 'online'}"></span>${user.username} (ID:${user.id})</span>
          <span>
            <button class="sec" onclick="muteUser(${user.id},${!user.muted})">${user.muted ? '解禁' : '禁言'}</button>
            <button class="danger" onclick="kickUser(${user.id})">踢出</button>
          </span>`;
        ul.appendChild(d);
      });
    });
  }
  renderUsers();
  grid.appendChild(ucard);

  // Broadcast
  const bcard = mkCard('广播消息');
  bcard.innerHTML += '<div class="row"><input id="broadcastInput" placeholder="输入系统广播内容..."><button onclick="broadcast()">发送</button></div>';
  grid.appendChild(bcard);

  // Ban IP
  const ipcard = mkCard('IP 黑名单');
  const bannedIps = await call('admin:bannedIps') || [];
  ipcard.innerHTML += '<div class="row"><input id="banIpInput" placeholder="如 192.168.1.100"><button onclick="banIp()">封禁</button></div>';
  ipcard.innerHTML += '<div class="list" id="ipList"></div>';
  const ipl = ipcard.querySelector('#ipList');
  bannedIps.forEach(ip => {
    ipl.innerHTML += `<div class="list-item"><span>${ip}</span><span class="del" onclick="unbanIp('${ip}')">✕</span></div>`;
  });
  grid.appendChild(ipcard);

  // Ban MAC
  const maccard = mkCard('MAC 黑名单');
  const bannedMacs = await call('admin:bannedMacs') || [];
  maccard.innerHTML += '<div class="row"><input id="banMacInput" placeholder="如 AA:BB:CC:DD:EE:FF"><button onclick="banMac()">封禁</button></div>';
  maccard.innerHTML += '<div class="list" id="macList"></div>';
  const macl = maccard.querySelector('#macList');
  bannedMacs.forEach(mac => {
    macl.innerHTML += `<div class="list-item"><span>${mac}</span><span class="del" onclick="unbanMac('${mac}')">✕</span></div>`;
  });
  grid.appendChild(maccard);

  // Banned Words
  const wcard = mkCard('屏蔽词');
  const words = await call('admin:getBannedWords') || [];
  wcard.innerHTML += '<div class="row"><input id="wordInput" placeholder="添加屏蔽词"><button onclick="addWord()">添加</button></div>';
  wcard.innerHTML += '<div class="list" id="wordList"></div>';
  const wl = wcard.querySelector('#wordList');
  words.forEach(w => {
    wl.innerHTML += `<div class="list-item"><span>${w}</span><span class="del" onclick="removeWord('${w.replace(/'/g, "\\'")}')">✕</span></div>`;
  });
  grid.appendChild(wcard);

  // Message query
  const qcard = mkCard('查询消息');
  qcard.innerHTML += `<div class="row"><input id="queryUser" placeholder="用户名（留空查全部）"><button onclick="queryMsgs()">查询</button></div>
    <div class="list" id="queryResult" style="max-height:200px;"></div>`;
  grid.appendChild(qcard);

  // Clear messages
  const ccard = mkCard('清空记录');
  ccard.innerHTML += '<button class="danger" onclick="clearMsgs()">清空所有聊天记录</button>';
  grid.appendChild(ccard);

  // Files
  const fcard = mkCard('文件管理');
  fcard.innerHTML += '<button onclick="loadFiles()">刷新文件列表</button><div class="list" id="fileList" style="max-height:200px;"></div>';
  grid.appendChild(fcard);
}

function mkCard(title) {
  const card = document.createElement('div');
  card.className = 'admin-card';
  card.innerHTML = `<h3>${title}</h3>`;
  return card;
}

async function broadcast() {
  const input = document.getElementById('broadcastInput');
  if (!input.value.trim()) return;
  await call('admin:broadcast', input.value.trim());
  input.value = '';
  toast('广播已发送');
}

async function muteUser(id, mute) {
  await call('admin:muteUser', id, mute);
  toast(mute ? '已禁言' : '已解禁');
}

async function kickUser(id) {
  await call('admin:kickUser', id);
  toast('已踢出');
}

async function banIp() {
  const ip = document.getElementById('banIpInput').value.trim();
  if (!ip) return;
  const r = await call('admin:banIp', ip);
  toast((r && r.success) ? 'IP 已封禁' : (r ? r.message : '操作失败'));
  loadAdmin();
}

async function unbanIp(ip) {
  await call('admin:unbanIp', ip);
  toast('IP 已解封');
  loadAdmin();
}

async function banMac() {
  const mac = document.getElementById('banMacInput').value.trim();
  if (!mac) return;
  const r = await call('admin:banMac', mac);
  toast((r && r.success) ? 'MAC 已封禁' : (r ? r.message : '操作失败'));
  loadAdmin();
}

async function unbanMac(mac) {
  await call('admin:unbanMac', mac);
  toast('MAC 已解封');
  loadAdmin();
}

async function addWord() {
  const input = document.getElementById('wordInput');
  if (!input.value.trim()) return;
  await call('admin:addBannedWord', input.value.trim());
  input.value = '';
  toast('屏蔽词已添加');
  loadAdmin();
}

async function removeWord(w) {
  await call('admin:removeBannedWord', w);
  toast('屏蔽词已删除');
  loadAdmin();
}

async function queryMsgs() {
  const username = document.getElementById('queryUser').value.trim() || null;
  const el = document.getElementById('queryResult');
  const msgs = await call('admin:queryMessages', username, null, null, 50) || [];
  el.innerHTML = msgs.map(m =>
    `<div class="list-item"><span>${m.username}: ${m.content.substring(0, 60)}</span><span style="color:#888">${new Date(m.timestamp).toLocaleString()}</span></div>`
  ).join('') || '<div class="list-item">无结果</div>';
  toast(`查到 ${msgs.length} 条消息`);
}

async function clearMsgs() {
  if (!confirm('确定清空所有聊天记录？此操作不可撤销！')) return;
  const r = await call('admin:clearMessages');
  toast(r && r.success ? '已清空' : '操作失败');
}

async function loadFiles() {
  const el = document.getElementById('fileList');
  const files = await call('admin:getFiles') || [];
  el.innerHTML = files.map(f =>
    `<div class="list-item"><span>${f.filename}</span><span class="del" onclick="deleteFile(${f.id})">✕</span></div>`
  ).join('') || '<div class="list-item">无文件</div>';
}

async function deleteFile(id) {
  await call('admin:deleteFile', id);
  toast('文件已删除');
  loadFiles();
}

// 等待主进程就绪再加载管理面板
let readyCalled = false;
async function ready() {
  readyCalled = true;
  loadAdmin();
}
// 后备：如果 ready() 5秒内没被调用，自动加载
setTimeout(() => { if (!readyCalled) loadAdmin(); }, 5000);
</script>
</body>
</html>
