<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LAN Chat 服务端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Consolas', 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
#toolbar { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#toolbar h1 { font-size: 14px; color: #e94560; font-weight: normal; }
#toolbar .status { font-size: 12px; color: #4ecca3; }
#toolbar .status.offline { color: #e94560; }
#log { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.6; }
#log div { white-space: pre-wrap; word-break: break-all; }
#log .info { color: #a0a0a0; }
#log .err { color: #e94560; }
#log .ok { color: #4ecca3; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>LAN Chat 服务端</h1>
  <span class="status" id="status">● 运行中</span>
</div>
<div id="log"></div>
<script>
const logEl = document.getElementById('log');
function addLog(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  if (msg.startsWith('[ERR]')) d.className = 'err';
  else if (msg.includes('✅')) d.className = 'ok';
  else d.className = 'info';
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
</script>
</body>
</html>
